services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: kb_pass
      POSTGRES_DB: skill_registry
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  registry:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://kb_user:kb_pass@db:5432/skill_registry"
      OLLAMA_HOST: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  code-reviewer:
    build: ./agents
    ports:
      - "8001:8001"
    depends_on:
      - registry
    environment:
      AGENT_NAME: "Code Reviewer"
      AGENT_PORT: "8001"
      AGENT_TECH_STACK: "python,typescript,go,java"
      AGENT_TASK_TYPES: "review,refactor"
      AGENT_DOMAINS: "backend,frontend,fullstack"
      AGENT_DIFFICULTY: "medium"
      AGENT_SYSTEM_PROMPT: "OUTPUT RULE: When a task says 'Return strict JSON', you MUST output ONLY valid JSON — no markdown, no code blocks, no preamble. Start your response with '{'. JSON format: {\"issues\": [{\"title\": \"...\", \"severity\": \"high/medium/low\", \"description\": \"...\", \"fix\": \"...\"}], \"summary\": \"...\"}. If code has no issues, return {\"issues\": [], \"summary\": \"No issues found.\"}.\n\nYou are a senior code reviewer. Review code for: 1)Security vulnerabilities (SQL injection, XSS, SSRF) 2)Performance bottlenecks 3)Code maintainability 4)Error handling 5)Best practices."
      AGENT_VERIFICATION: '{"type":"composite","test_cases":[{"task":"Review this code for security issues. Return strict JSON (no markdown): {\"issues\":[{\"title\":\"\",\"severity\":\"\",\"description\":\"\",\"fix\":\"\"}],\"summary\":\"\"}","context":{"code":"def login(user, pw):\n    sql = f\"SELECT * FROM users WHERE name={user}\"\n    db.execute(sql)"},"steps":[{"type":"contract","required_keys":["issues","summary"]},{"type":"rubric","dimensions":{"accuracy":"Correctly identified SQL injection vulnerability","completeness":"Provided parameterized query fix","actionability":"Fix code is directly usable"}}]},{"task":"Review this code for performance issues. Return strict JSON (no markdown): {\"issues\":[{\"title\":\"\",\"severity\":\"\",\"description\":\"\",\"fix\":\"\"}],\"summary\":\"\"}","context":{"code":"def find_pairs(data):\n    result = []\n    for i in range(len(data)):\n        for j in range(len(data)):\n            result.append((data[i], data[j]))\n    return result"},"steps":[{"type":"contract","required_keys":["issues","summary"]},{"type":"rubric","dimensions":{"accuracy":"Correctly identified O(n^2) complexity issue","completeness":"Provided optimization strategy","actionability":"Optimization suggestion is concrete and implementable"}}]},{"task":"Review this code. Return strict JSON (no markdown): {\"issues\":[{\"title\":\"\",\"severity\":\"\",\"description\":\"\",\"fix\":\"\"}],\"summary\":\"\"}","context":{"code":"def add(a: int, b: int) -> int:\n    return a + b"},"steps":[{"type":"contract","required_keys":["issues","summary"]},{"type":"rubric","dimensions":{"accuracy":"Correctly stated code has no issues","completeness":"Avoided unfounded criticism","actionability":"Conclusion is clear and unambiguous"}}]}]}'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  test-writer:
    build: ./agents
    ports:
      - "8002:8002"
    depends_on:
      - registry
    environment:
      AGENT_NAME: "Test Writer"
      AGENT_PORT: "8002"
      AGENT_TECH_STACK: "python,fastapi,flask,typescript"
      AGENT_TASK_TYPES: "test"
      AGENT_DOMAINS: "backend,frontend"
      AGENT_DIFFICULTY: "easy"
      AGENT_SYSTEM_PROMPT: "You are a professional test engineer. Generate pytest test cases for the given function code. Cover: 1)Happy path 2)Boundary conditions 3)Exception handling 4)Mock external dependencies. Output only runnable pytest code inside a single python code block (```python ... ```). Do not add extra explanation."
      AGENT_VERIFICATION: '{"type":"execute","test_cases":[{"task":"Write pytest tests for a simple function","context":{"code":"def add(a, b):\n    return a + b"},"steps":[{"type":"execute","run_command":"pip install pytest -q && python -m pytest test_output.py -q --tb=short","timeout":60,"assert":{"exit_code":0},"filename":"test_output.py"}]},{"task":"Write pytest tests covering edge cases and exceptions","context":{"code":"def divide(a, b):\n    if b == 0:\n        raise ValueError(\"cannot divide by zero\")\n    return a / b"},"steps":[{"type":"execute","run_command":"pip install pytest -q && python -m pytest test_output.py -q --tb=short","timeout":60,"assert":{"exit_code":0},"filename":"test_output.py"}]},{"task":"Write pytest tests with a fixture for class instance","context":{"code":"class Calculator:\n    def __init__(self):\n        self.history = []\n    def add(self, a, b):\n        result = a + b\n        self.history.append((\"add\", a, b, result))\n        return result"},"steps":[{"type":"execute","run_command":"pip install pytest -q && python -m pytest test_output.py -q --tb=short","timeout":60,"assert":{"exit_code":0},"filename":"test_output.py"}]}]}'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend-dev:
    build: ./agents
    ports:
      - "8003:8003"
    depends_on:
      - registry
    environment:
      AGENT_NAME: "Backend Developer"
      AGENT_PORT: "8003"
      AGENT_ENDPOINT: "http://backend-dev:8003/run"
      AGENT_TECH_STACK: "python,fastapi,postgresql,redis,docker"
      AGENT_TASK_TYPES: "develop,debug,design"
      AGENT_DOMAINS: "backend"
      AGENT_DIFFICULTY: "hard"
      AGENT_SYSTEM_PROMPT: "You are a senior backend engineer specializing in FastAPI, PostgreSQL, Redis. When designing APIs focus on: 1)RESTful design conventions 2)Database schema design and indexing 3)Caching strategies 4)Error code conventions 5)Concurrency and rate limiting. Output runnable code inside a single python code block (```python ... ```). Do not add extra explanation unless asked."
      AGENT_VERIFICATION: >-
        {"type":"execute","test_cases":[{"task":"Write a FastAPI app with GET /health","context":{"code":"# write a fastapi app, GET /health returns {\"status\":\"ok\"}"},"steps":[{"type":"execute","run_command":"python -c \"import ast; ast.parse(open('test_output.py').read()); print('syntax OK')\"","timeout":15,"assert":{"exit_code":0},"filename":"test_output.py"}]},{"task":"Write a Pydantic model for user input validation","context":{"code":"# write a Pydantic UserCreate model with name(str,1-50), email(EmailStr), age(int,18-120)"},"steps":[{"type":"execute","run_command":"pip install pydantic -q && python -c \"exec(open('test_output.py').read()); print('import OK')\"","timeout":30,"assert":{"exit_code":0},"filename":"test_output.py"}]}]}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-dev:
    build: ./agents
    ports:
      - "8004:8004"
    depends_on:
      - registry
    environment:
      AGENT_NAME: "Frontend Developer"
      AGENT_PORT: "8004"
      AGENT_ENDPOINT: "http://frontend-dev:8004/run"
      AGENT_TECH_STACK: "react,typescript,css,tailwind,vite"
      AGENT_TASK_TYPES: "develop,debug,refactor"
      AGENT_DOMAINS: "frontend"
      AGENT_DIFFICULTY: "medium"
      AGENT_SYSTEM_PROMPT: "You are a senior frontend engineer specializing in React + TypeScript + Tailwind CSS. Focus on: 1)Component design and reusability 2)Responsive layout 3)Accessibility (a11y) 4)Performance (lazy loading, memoization) 5)Type safety. When asked to return JSON format, strictly return valid JSON without markdown wrapping or extra commentary. JSON format: {\"component\": \"ComponentName\", \"code\": \"full TSX code here\"}."
      AGENT_VERIFICATION: '{"type":"composite","test_cases":[{"task":"Write a simple React functional component. Return strict JSON (no markdown): {\"component\":\"ComponentName\",\"code\":\"...\"}","context":{"code":"# Write a Greeting component that takes a name prop and renders Hello, {name}!"},"steps":[{"type":"contract","required_keys":["component","code"]},{"type":"rubric","dimensions":{"correctness":"Component correctly renders the expected greeting","type_safety":"Uses TypeScript with proper prop types","simplicity":"Solution is minimal and readable"}}]},{"task":"Write a React component with useState. Return strict JSON (no markdown): {\"component\":\"ComponentName\",\"code\":\"...\"}","context":{"code":"# Write a Toggle component with a button that toggles between ON/OFF text"},"steps":[{"type":"contract","required_keys":["component","code"]},{"type":"rubric","dimensions":{"correctness":"Toggle logic works correctly on click","type_safety":"State and event handler types are correct","a11y":"Button has aria-label for accessibility"}}]}]}'
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
